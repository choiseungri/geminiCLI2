server {
    listen 80;
    server_name localhost; # Or your domain

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Serve static files directly
    location ~* \.(?:css|js|map|jpe?g|png|gif|ico|webmanifest|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # For SPA: try to serve file directly, then directory, then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: You might want to proxy API requests if frontend and backend are served on the same domain
    # but in different containers. This is usually handled by an Ingress controller or API Gateway in k8s,
    # or a reverse proxy setup if deploying on a single server.
    # If your Vite proxy handles this in dev, you'll need a similar setup in prod.
    # Example for proxying /api to a backend service:
    # location /api {
    //     proxy_pass http://backend-service-name:3000; # Replace with your backend service address
    //     proxy_set_header Host $host;
    //     proxy_set_header X-Real-IP $remote_addr;
    //     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    //     proxy_set_header X-Forwarded-Proto $scheme;
    // }

    # Optional: Gzip compression for text-based assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Optional: Security headers
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-Content-Type-Options "nosniff";
    # add_header X-XSS-Protection "1; mode=block";
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
